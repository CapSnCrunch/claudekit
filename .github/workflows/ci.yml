name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # Frontend tests — fast, runs on cheap Linux runner
  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Run frontend tests
        run: bun test

  # Rust unit tests
  test-rust:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Run Rust tests
        run: cargo test
        working-directory: src-tauri

  # Full Tauri build — verifies the app actually compiles end-to-end
  build:
    runs-on: macos-latest
    needs: [test-frontend, test-rust]
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app
        run: bun tauri build
        env:
          # Skip macOS code signing in CI — produces unsigned binary
          APPLE_SIGNING_IDENTITY: ""
