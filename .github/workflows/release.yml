name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release-macos:
    runs-on: macos-latest
    permissions:
      contents: write  # needed to create GitHub releases

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: bun install

      - name: Build Tauri app
        run: bun tauri build
        env:
          # Code signing — set these secrets in repo settings for signed releases.
          # If not set, the build produces an unsigned .dmg (fine for early releases).
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload .dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeKit-${{ github.ref_name }}-macos
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ClaudeKit ${{ github.ref_name }}
          draft: true  # review before publishing
          files: src-tauri/target/release/bundle/dmg/*.dmg
